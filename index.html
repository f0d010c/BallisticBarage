<!DOCTYPE html>
<!--
  BALLISTIC BARRAGE
  =================
  A browser-based arcade game inspired by brick-breaker / ballistic mechanics.

  HOW TO RUN:
  - Open index.html directly in any modern browser (Chrome, Firefox, Safari, Edge).
  - Or serve with: python3 -m http.server 8080
    then visit http://localhost:8080

  FILES:
  - index.html  → Structure and canvas
  - styles.css  → Layout, UI, animations
  - script.js   → All game logic, physics, rendering, audio
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ballistic Barrage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Start Screen -->
  <div id="start-screen" class="overlay active">
    <div class="overlay-content">
      <h1 class="game-title">BALLISTIC<br><span class="title-accent">BARRAGE</span></h1>
      <p class="tagline">AIM · LAUNCH · OBLITERATE</p>
      <div class="instructions">
        <div class="instruction-item">
          <span class="icon">◎</span>
          <span>Drag to aim, release to fire</span>
        </div>
        <div class="instruction-item">
          <span class="icon">◈</span>
          <span>Balls bounce and break blocks</span>
        </div>
        <div class="instruction-item">
          <span class="icon">⬡</span>
          <span>Collect orbs to gain more balls</span>
        </div>
        <div class="instruction-item">
          <span class="icon">▲</span>
          <span>Don't let blocks reach the bottom!</span>
        </div>
      </div>
      <button id="btn-play" class="btn-primary pulse">PLAY</button>
      <div class="start-btn-row">
        <button id="btn-skins" class="btn-secondary">SKINS</button>
        <button id="btn-leaderboard-start" class="btn-secondary">LEADERBOARD</button>
      </div>
      <div class="best-score-display" id="start-best-score"></div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" class="overlay">
    <div class="overlay-content">
      <h2 class="gameover-title">GAME OVER</h2>
      <div class="score-block">
        <div class="score-row">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="go-score">0</span>
        </div>
        <div class="score-row">
          <span class="score-label">BEST</span>
          <span class="score-value highlight" id="go-best">0</span>
        </div>
        <div class="score-row">
          <span class="score-label">TURN</span>
          <span class="score-value" id="go-turn">0</span>
        </div>
      </div>
      <div class="new-best" id="new-best-badge">★ NEW BEST ★</div>
      <button id="btn-restart" class="btn-primary">PLAY AGAIN</button>
      <button id="btn-leaderboard-go" class="btn-secondary">LEADERBOARD</button>
    </div>
  </div>

  <!-- Pause Screen -->
  <div id="pause-screen" class="overlay">
    <div class="overlay-content">
      <h2 class="pause-title">PAUSED</h2>
      <button id="btn-resume" class="btn-primary">RESUME</button>
      <button id="btn-skins-pause" class="btn-secondary">SKINS</button>
      <button id="btn-restart-pause" class="btn-secondary">RESTART</button>
    </div>
  </div>

  <!-- Skin Selector Screen -->
  <div id="skin-screen" class="overlay">
    <div class="overlay-content">
      <h2 class="section-title">BALL SKINS</h2>
      <div class="skin-grid" id="skin-grid"></div>
      <button id="btn-skin-close" class="btn-secondary">DONE</button>
    </div>
  </div>

  <!-- Leaderboard Screen -->
  <div id="leaderboard-screen" class="overlay">
    <div class="overlay-content leaderboard-content">
      <h2 class="section-title">LEADERBOARD</h2>
      <div id="lb-auth-row" class="lb-auth-row">
        <div class="lb-user-chip">
          <img id="lb-user-photo" class="lb-user-photo" src="" alt="" style="display:none">
          <span id="lb-user-name" class="lb-user-name"></span>
        </div>
        <div class="lb-auth-btns">
          <button id="btn-signin" class="btn-auth">SIGN IN WITH GOOGLE</button>
          <button id="btn-signout" class="btn-auth btn-auth-out" style="display:none">SIGN OUT</button>
        </div>
      </div>
      <div id="lb-list" class="lb-list"></div>
      <button id="btn-lb-close" class="btn-secondary">CLOSE</button>
    </div>
  </div>

  <!-- Main game container -->
  <div id="game-wrapper">

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-item">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">BEST</span>
          <span class="hud-value" id="hud-best">0</span>
        </div>
      </div>
      <div class="hud-center">
        <div class="hud-item">
          <span class="hud-label">TURN</span>
          <span class="hud-value" id="hud-turn">1</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-item">
          <span class="hud-label">BALLS</span>
          <span class="hud-value" id="hud-balls">1</span>
        </div>
        <button id="btn-mute" class="btn-icon" title="Toggle sound">🔊</button>
        <button id="btn-fast" class="btn-icon" title="Fast forward" style="display:none">⏩</button>
        <button id="btn-pause" class="btn-icon" title="Pause">⏸</button>
      </div>
    </div>

    <!-- Canvas -->
    <canvas id="game-canvas"></canvas>

  </div>

  <!-- Firebase SDK (compat v9) — only loaded, not initialized unless FIREBASE_CONFIG is set in script.js -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="script.js"></script>
</body>
</html>
